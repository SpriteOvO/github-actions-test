name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone
        run: git clone https://github.com/telegramdesktop/tdesktop.git --recursive
      - name: Env
        shell: bash
        run: |
          WIN_SDK="$(grep "SDK version" tdesktop/docs/building-win.md | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "WIN_SDK=$WIN_SDK" >> $GITHUB_ENV

          echo "$(sha256sum tdesktop/Telegram/build/prepare/prepare.py | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$WIN_SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV
          cat CACHE_KEY.txt
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ThirdParty
            Libraries
          key: ${{ runner.OS }}-x64-${{ env.CACHE_KEY }}
      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          sdk: ${{ env.WIN_SDK }}
      - name: Prepare
        run: tdesktop\Telegram\build\prepare\win.bat silent
      - name: Configure
        run: |
          tdesktop\Telegram\configure.bat ^
            x64 ^
            -DDESKTOP_APP_ENABLE_LTO=ON ^
            -DTDESKTOP_API_ID=${{ secrets.TDESKTOP_API_ID }} ^
            -DTDESKTOP_API_HASH=${{ secrets.TDESKTOP_API_HASH }}
      - name: Build
        run: cmake --build tdesktop\out --config Release --target Telegram --parallel
      - name: Install RustDesk for Debug
        shell: powershell
        run: |
          choco install rustdesk.install
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --install-service
      - name: Install RustDesk for Debug 2
        shell: powershell
        run: |
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --get-id | Out-String
      - name: Install RustDesk for Debug 3
        shell: powershell
        run: |
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --password AWeakpASSword
      - name: Block for remote control
        shell: bash
        run: sleep 10000000
