name: ArchLinux

on:
  workflow_dispatch:
  push:

jobs:
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GIT_CLONE_OWNER }}/${{ secrets.GIT_CLONE_REPO }}
          path: ${{ secrets.GIT_CLONE_REPO }}
          ssh-key: ${{ secrets.GIT_CLONE_SSH_KEY }}
          ref: ci-test
          fetch-depth: 0
      - name: Bootstrap
        run: |
          curl -OL https://geo.mirror.pkgbuild.com/iso/latest/archlinux-bootstrap-x86_64.tar.zst
          mkdir arch
          sudo tar xf archlinux-bootstrap-x86_64.tar.zst -C arch --numeric-owner
          sudo mount --bind arch/root.x86_64/ arch/root.x86_64/
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' | sudo tee arch/root.x86_64/etc/pacman.d/mirrorlist

          arch_run="sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/"
          $arch_run pacman-key --init
          $arch_run pacman-key --populate
          $arch_run pacman -Syyu --noconfirm base-devel devtools sudo pacman-contrib 7zip
          $arch_run useradd -m builder
          $arch_run bash -c 'echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >> /etc/sudoers'
          sudo mv ${{ secrets.GIT_CLONE_REPO }} arch/root.x86_64/home/builder/${{ secrets.GIT_CLONE_REPO }}
          $arch_run chown -R builder /home/builder/${{ secrets.GIT_CLONE_REPO }}

          cat > arch-run << 'EOL'
          #!/bin/bash
          name=$(basename $2)
          sudo cp $2 arch/root.x86_64/mnt/$name
          sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/ su - $1 -c "sudo mv /mnt/$name /tmp/ && bash /tmp/$name"
          EOL
          chmod +x arch-run
          sudo mv arch-run /bin/arch-run
      - name: Prepare
        shell: arch-run builder {0}
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/prepare.sh
      - name: Build
        shell: arch-run builder {0}
        run: echo 1 # ${{ secrets.GIT_CLONE_REPO }}/scripts/build-arch.sh
      - name: Upload
        if: always()
        shell: arch-run builder {0}
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/upload.sh "${{ secrets.UPLOAD_TOKEN }}" "${{ job.status }}"
      - name: Setup tmate session
        if: always()
        uses: mxschmitt/action-tmate@v3
