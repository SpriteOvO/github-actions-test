name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone tdesktop
        run: git clone https://github.com/telegramdesktop/tdesktop.git --recursive
      - name: Prepare
        shell: powershell
        run: |
          "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" -vcvars_ver=14.44 \
            && tdesktop\Telegram\build\prepare\win.bat
      - name: Install RustDesk for Debug
        shell: powershell
        run: |
          choco install rustdesk.install
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --install-service
      - name: Install RustDesk for Debug 2
        shell: powershell
        run: |
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --get-id | Out-String
      - name: Install RustDesk for Debug 3
        shell: powershell
        run: |
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --password AWeakpASSword
      - name: Block for remote control
        shell: bash
        run: sleep 10000000
