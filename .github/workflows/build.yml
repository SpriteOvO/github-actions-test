name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone tdesktop
        run: git clone https://github.com/telegramdesktop/tdesktop.git --recursive
      - name: Install RustDesk for Debug
        shell: powershell
        run: |
          choco install rustdesk.install
          cd "C:\Program Files\RustDesk\"
          ./rustdesk.exe --install-service
          ./rustdesk.exe --get-id | Out-String
          ./rustdesk.exe --password AWeakpASSword
      - name: Block for remote control
        run: sleep 10000000
