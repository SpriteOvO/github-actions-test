name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install wine64 wine32:i386 winbind python3 msitools ca-certificates
      - name: Clone tdesktop
        run: git clone https://github.com/telegramdesktop/tdesktop.git --recursive
      - name: Clone msvc-wine
        run: git clone https://github.com/mstorsjo/msvc-wine.git
      - name: Setup MSVC
        run: |
          msvc-wine/vsdownload.py --dest ~/msvc-wine/opt/msvc --accept-license
          msvc-wine/install.sh ~/msvc-wine/opt/msvc
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
