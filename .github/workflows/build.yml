name: ArchLinux

on:
  workflow_dispatch:
  push:

jobs:
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GIT_CLONE_OWNER }}/${{ secrets.GIT_CLONE_REPO }}
          path: ${{ secrets.GIT_CLONE_REPO }}
          ssh-key: ${{ secrets.GIT_CLONE_SSH_KEY }}
          ref: ci-test
          fetch-depth: 0
      - name: Bootstrap ArchLinux
        run: |
          curl -OL https://geo.mirror.pkgbuild.com/iso/latest/archlinux-bootstrap-x86_64.tar.zst
          mkdir arch
          sudo tar xf archlinux-bootstrap-x86_64.tar.zst -C arch --numeric-owner
          sudo mount --bind arch/root.x86_64/ arch/root.x86_64/
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' | sudo tee arch/root.x86_64/etc/pacman.d/mirrorlist

          cat > arch-run << 'EOL'
          #!/bin/bash
          name=$(basename $2)
          sudo cp $2 arch/root.x86_64/mnt/$name
          sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/ su - $1 -c "bash /mnt/$name"
          EOL
          chmod +x arch-run
          sudo ln -s $(pwd)/arch-run /bin/arch-run

          arch_run="sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/"
          $arch_run pacman-key --init
          $arch_run pacman-key --populate
          $arch_run pacman -Syyu --noconfirm base-devel devtools sudo
          $arch_run useradd -m builder
          $arch_run 'echo "builder ALL=(ALL:ALL) NOPASSWD: ALL" >> /etc/sudoers'

          sudo mv ${{ secrets.GIT_CLONE_REPO }} arch/root.x86_64/home/builder/${{ secrets.GIT_CLONE_REPO }}
      - name: Move repo into builder
        run: 
      - name: Build
        shell: arch-run builder {0}
        run: |
          sudo chown -R builder ${{ secrets.GIT_CLONE_REPO }}
          git clone https://gitlab.archlinux.org/archlinux/packaging/packages/telegram-desktop.git
          cd telegram-desktop
          # makepkg -s --noconfirm
      - name: Setup tmate session
        if: always()
        uses: mxschmitt/action-tmate@v3
