name: ArchLinux

on:
  workflow_dispatch:
  push:

jobs:
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - name: Download ArchLinux bootstrap
        run: |
          curl -OL https://geo.mirror.pkgbuild.com/iso/latest/archlinux-bootstrap-x86_64.tar.zst
          mkdir arch
          sudo tar xf archlinux-bootstrap-x86_64.tar.zst -C arch --numeric-owner

          cat >> arch-run << EOF
          #!/bin/bash
          name=$(basename $1)
          sudo cp $1 arch/root.x86_64/mnt/$name
          sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/ bash /mnt/$name
          EOF

          chmod +x arch-run
      - name: Bootstrap ArchLinux
        shell: arch-run ${0}
        run: |
          pacman-key --init
          pacman-key --populate
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
