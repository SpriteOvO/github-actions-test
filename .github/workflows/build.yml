name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v6
        with:
          repository: SpriteOvO/actions-test-private
          path: TODO
          ssh-key: ${{ secrets.GIT_CLONE_SSH_KEY }}
      - name: Get source
        run: bash TODO/scripts/get-source.sh
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ThirdParty
            Libraries
          key: ${{ runner.OS }}-x64-${{ env.CACHE_KEY }}
      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          sdk: ${{ env.WIN_SDK }}
      - name: Prepare
        run: bash TODO/scripts/build-win.ps1
      - name: Upload logs
        if: always()
        run: |
          Compress-Archive step-logs step-logs.zip
          bash TODO/scripts/upload.sh ${{ secrets.UPLOAD_TOKEN }} step-logs.zip
