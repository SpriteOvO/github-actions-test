name: ArchLinux

on:
  workflow_dispatch:
  push:

jobs:
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.GIT_CLONE_OWNER }}/${{ secrets.GIT_CLONE_REPO }}
          path: ${{ secrets.GIT_CLONE_REPO }}
          ssh-key: ${{ secrets.GIT_CLONE_SSH_KEY }}
          ref: ci-test
          fetch-depth: 0
      - name: Bootstrap
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/bootstrap-arch.sh
      - name: Prepare
        shell: arch-run {0}
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/prepare.sh
      - name: Build
        shell: arch-run {0}
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/build-arch.sh
      - name: Upload
        if: always()
        shell: arch-run {0}
        run: ${{ secrets.GIT_CLONE_REPO }}/scripts/upload.sh "${{ secrets.UPLOAD_TOKEN }}" "archlinux" "${{ job.status }}"
      - name: Setup tmate session
        if: always()
        uses: mxschmitt/action-tmate@v3
