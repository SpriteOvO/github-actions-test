name: Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Clone tdesktop
        run: git clone https://github.com/telegramdesktop/tdesktop.git --recursive
      - name: Setup tmate session
        shell: cmd
        run: |
          choco install chrome-remote-desktop-host
          "%PROGRAMFILES(X86)%\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepCaifjkeaF5yOWftN_BU85abRRVVWQ-zMv5ikFdeQPdpk-BG02fR8QE5_oYq5ReCw" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=%COMPUTERNAME%
      - name: sleep
        shell: bash
        run: sleep 100000
