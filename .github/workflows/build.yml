name: ArchLinux

on:
  workflow_dispatch:
  push:

jobs:
  archlinux:
    runs-on: ubuntu-latest
    steps:
      - name: Download ArchLinux bootstrap
        run: |
          curl -OL https://geo.mirror.pkgbuild.com/iso/latest/archlinux-bootstrap-x86_64.tar.zst
          mkdir arch
          sudo tar xf archlinux-bootstrap-x86_64.tar.zst -C arch --numeric-owner
          sudo mount --bind arch/root.x86_64/ arch/root.x86_64/
  
          echo 'Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch' | sudo tee arch/root.x86_64/etc/pacman.d/mirrorlist

          cat > arch-run << 'EOL'
          #!/bin/bash
          name=$(basename $1)
          sudo cp $1 arch/root.x86_64/mnt/$name
          sudo arch/root.x86_64/bin/arch-chroot arch/root.x86_64/ bash -c "cd ~ && bash /mnt/$name"
          EOL

          chmod +x arch-run
          sudo ln -s $(pwd)/arch-run /bin/arch-run
      - name: Install devtools in ArchLinux
        shell: arch-run {0}
        run: |
          pwd
          pacman-key --init
          pacman-key --populate
          pacman -Syyu --noconfirm devtools
      - name: Build
        shell: arch-run {0}
        run: |
          git clone https://gitlab.archlinux.org/archlinux/packaging/packages/telegram-desktop.git
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
